<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400" role="img" aria-label="Говорун для macOS — голосовой ввод на русском без интернета">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5F5F7"/>
      <stop offset="100%" stop-color="#E8E8EB"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="400" rx="32" fill="url(#bg)"/>

  <!-- Soft circle behind the logo -->
  <circle cx="230" cy="200" r="155" fill="#FFFFFF" opacity="0.85"/>

  <!-- Bird mark (24×24 viewport, same as app icon) -->
  <g transform="translate(80 62) scale(12)" stroke="#1D192B" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path stroke-width="0.4" d="M21.5,10.5 L17.5,9 C14.5,5.5 9,5.5 6,9.5 L3,8.5 L4,12.5 C5.5,15.5 9,17.5 13,17.5 C16,17.5 18,15.5 18,13 L21.5,11.5 Z"/>
    <path stroke-width="0.3" d="M7.5,11.5 C9.5,13.5 12,14.5 15,14"/>
    <circle cx="15.2" cy="9" r="0.7" fill="#1D192B" stroke="none"/>
  </g>

  <g font-family="'Inter Display', Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
    <text x="470" y="175" font-size="82" font-weight="800" letter-spacing="-2" fill="#14141A">Говорун</text>
    <text x="473" y="222" font-size="28" font-weight="500" fill="#6E6E76">для macOS</text>
    <text x="473" y="262" font-size="22" fill="#4A4A52">Голосовой ввод на русском. Офлайн. Menu bar.</text>

    <g transform="translate(470 300)" font-size="15" fill="#4A4A52">
      <g>
        <rect width="122" height="36" rx="18" fill="none" stroke="#C8C8CE" stroke-width="1.5"/>
        <text x="61" y="23.5" text-anchor="middle">macOS 13+</text>
      </g>
      <g transform="translate(138 0)">
        <rect width="148" height="36" rx="18" fill="none" stroke="#C8C8CE" stroke-width="1.5"/>
        <text x="74" y="23.5" text-anchor="middle">Apple Silicon</text>
      </g>
      <g transform="translate(302 0)">
        <rect width="108" height="36" rx="18" fill="none" stroke="#C8C8CE" stroke-width="1.5"/>
        <text x="54" y="23.5" text-anchor="middle">GigaAM v3</text>
      </g>
      <g transform="translate(426 0)">
        <rect width="100" height="36" rx="18" fill="none" stroke="#C8C8CE" stroke-width="1.5"/>
        <text x="50" y="23.5" text-anchor="middle">офлайн</text>
      </g>
    </g>
  </g>
</svg>
